name: Nanvix CI

on:
  schedule:
    - cron: "0 9 * * *"
  push:
    branches:
      - main
      - "nanvix/**"
  pull_request:
    branches:
      - main
      - "nanvix/**"
  workflow_dispatch:
  repository_dispatch:
    types: [nanvix-minor-release, nanvix-major-release]

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v1.12.0
    with:
      zutil-version: "v0.7.26"
      process-modes: '["standalone"]'
      caller-event-name: ${{ github.event_name }}
      windows-test: true
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
