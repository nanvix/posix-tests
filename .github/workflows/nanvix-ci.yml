name: Nanvix CI

on:
  schedule:
    - cron: "0 9 * * *"
  push:
    branches:
      - main
      - "nanvix/**"
  pull_request:
    branches:
      - main
      - "nanvix/**"
  workflow_dispatch:
  repository_dispatch:
    types: [nanvix-minor-release, nanvix-major-release]

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v1.8.0
    with:
      zutil-version: "v0.7.21"
      caller-event-name: ${{ github.event_name }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}

  windows:
    name: Windows (build + test)
    runs-on: windows-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup
        shell: pwsh
        run: ./z.ps1 setup

      - name: Build (Docker)
        shell: pwsh
        run: ./z.ps1 build

      - name: Test
        shell: pwsh
        run: ./z.ps1 test
