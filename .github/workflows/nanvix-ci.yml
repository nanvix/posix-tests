name: Nanvix CI

on:
  schedule:
    - cron: "0 9 * * *"
  push:
    branches:
      - main
      - "nanvix/**"
  pull_request:
    branches:
      - main
      - "nanvix/**"
  workflow_dispatch:
  repository_dispatch:
    types: [nanvix-minor-release, nanvix-major-release]

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v1.9.0
    with:
      zutil-version: "v0.7.21"
      caller-event-name: ${{ github.event_name }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}

  windows-test:
    name: Windows (test)
    runs-on: windows-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup (download sysroot + Windows binaries)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./z.ps1 setup

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "posix-tests-*-microvm-standalone-*"
          merge-multiple: true
          path: _artifacts

      - name: Extract test binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build -Force | Out-Null
          $tarball = Get-ChildItem -Path _artifacts -Filter "*.tar.bz2" | Select-Object -First 1
          if (-not $tarball) {
            Write-Error "No tarball found in _artifacts/"
            exit 1
          }
          Write-Host "Extracting $($tarball.Name)..."
          tar xjf $tarball.FullName -C build
          Get-ChildItem build/*.elf | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Test
        shell: pwsh
        run: ./z.ps1 test
