name: Nanvix CI

on:
  schedule:
    - cron: "0 9 * * *"
  push:
    branches:
      - main
      - "nanvix/**"
  pull_request:
    branches:
      - main
      - "nanvix/**"
  workflow_dispatch:
  repository_dispatch:
    types: [nanvix-minor-release, nanvix-major-release]

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  ci:
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v3.0.1
    with:
      platforms: '["microvm"]'
      process-modes: '["single-process","standalone"]'
      memory-sizes: '["256mb"]'
      windows-matrix-exclude: '[]'
      skip-full-test-modes: '[]'
      caller-event-name: ${{ github.event_name == 'workflow_dispatch' && 'schedule' || github.event_name }}
      windows-test: true
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
